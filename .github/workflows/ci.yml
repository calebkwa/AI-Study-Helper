# ─────────────────────────────────────────────────────────────
# .github/workflows/ci.yml — CI Skeleton 
# ─────────────────────────────────────────────────────────────

name: CI Pipeline

on:
  push:
    branches:
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Smoke test (placeholder)
        run: echo "CI skeleton is working — add real tests in Week 12"

      - name: Build Docker image
        run: docker build -t study-ai:ci-check .
